target-version = "py39"
line-length = 88
src = ["avlex", "tests"]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "NPY", # numpy-specific rules
]
ignore = [
    "E501",  # line length handled by the formatter
]

[lint.per-file-ignores]
"tests/*" = ["B011"]
"examples/*" = ["E402"]

[lint.isort]
known-first-party = ["avlex"]
